<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>2025年度 ニューメディア研究ゼミ 卒業研究一覧</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Noto Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient fixed-top" id="main-navbar" style="transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-graduation-cap me-2"></i>ニューメディア研究ゼミ
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#main-content">2025年度卒業研究一覧</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section" id="hero-section">
        <div class="hero-background-image" id="hero-background-image"></div>
        <video class="hero-background-video" id="hero-background-video" muted playsinline>
            <source id="hero-video-source" src="" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-title-bar">
                <div class="hero-title-wrapper">
                    <h1 class="hero-title animate-fade-in" id="hero-title" style="visibility: hidden;">ニューメディア研究ゼミ</h1>
                </div>
                <div class="hero-subtitle-wrapper">
                    <h2 class="hero-subtitle animate-fade-in-delay" id="hero-subtitle" style="visibility: hidden;">2025年度 卒業研究発表</h2>
                </div>
            </div>
        </div>
        <a href="#main-content" class="hero-scroll-indicator">
            <i class="fas fa-chevron-down"></i>
        </a>
        <!-- Hero Video Caption -->
        <div class="hero-video-caption" id="hero-video-caption">
            <a href="#" class="hero-video-caption-link" id="hero-video-caption-link">
                <div class="hero-video-caption-title-wrapper">
                    <div class="hero-video-caption-title" id="hero-video-caption-title"></div>
                </div>
            </a>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <div class="container py-5">
            <div class="row mb-4">
                <div class="col-12 text-center">
                    <h2 class="section-title">卒業研究一覧</h2>
                </div>
            </div>

            <!-- View Toggle Buttons -->
            <div class="row mb-4">
                <div class="col-12 d-flex justify-content-end">
                    <div class="btn-group" role="group" aria-label="ビュー切り替え">
                        <input type="radio" class="btn-check" name="view-toggle" id="view-card" autocomplete="off" checked>
                        <label class="btn btn-outline-primary" for="view-card">
                            <i class="fas fa-th-large me-2"></i>カード表示
                        </label>
                        <input type="radio" class="btn-check" name="view-toggle" id="view-table" autocomplete="off">
                        <label class="btn btn-outline-primary" for="view-table">
                            <i class="fas fa-table me-2"></i>表表示
                        </label>
                    </div>
                </div>
            </div>

            <!-- Loading -->
            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">読み込み中...</span>
                </div>
                <p class="mt-3">データを読み込んでいます...</p>
            </div>

            <!-- Error -->
            <div id="error" class="alert alert-danger alert-dismissible fade" role="alert" style="display: none;">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <strong>エラーが発生しました。</strong> Excelファイルを確認してください。
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Student List -->
            <div id="student-list" class="row g-4"></div>
            
            <!-- Student Table (hidden by default) -->
            <div id="student-table-container" style="display: none;">
                <div class="table-responsive">
                    <table class="table table-hover student-table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">画像</th>
                                <th style="width: 100px;">学籍番号</th>
                                <th>研究題目</th>
                                <th style="width: 120px;">氏名</th>
                                <th style="width: 150px;">氏名（英字）</th>
                                <th style="width: 100px;">所属学年</th>
                                <th style="width: 200px;">タグ</th>
                            </tr>
                        </thead>
                        <tbody id="student-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-section">
        <div class="container py-4">
            <div class="row">
                <div class="col-12 text-center">
                    <p class="mb-0">&copy; 2025 甲南女子大学文学部メディア表現学科ニューメディア研究ゼミ</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Tweakpane (デバッグ用) -->
    <script type="module">
        import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';
        // グローバル変数として利用できるようにする
        window.Tweakpane = { Pane };
        window.Pane = Pane;
        console.log('Tweakpane 4.0.5読み込み完了:', typeof window.Tweakpane, typeof window.Pane);
    </script>
    <!-- SheetJSライブラリ -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <!-- Random Text Animation Library (オプション: js/random-text.umd.jsがあれば使用) -->
    <script src="js/random-text.umd.js" onerror="console.log('random-text.umd.jsが見つかりません。組み込み版を使用します。')"></script>
    <!-- Hero Video Shader (オプション) -->
    <script src="js/hero-shader.js" onerror="console.log('hero-shader.jsが見つかりません。シェーダー効果は無効です。')"></script>
    <script src="js/main.js"></script>
</body>
</html>
