<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>2025年度 ニューメディア研究ゼミ 卒業研究一覧</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient fixed-top" id="main-navbar" style="transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-graduation-cap me-2"></i>ニューメディア研究ゼミ
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#main-content">卒業研究一覧</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section" id="hero-section">
        <div class="hero-background-image" id="hero-background-image"></div>
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <div class="row justify-content-center text-center">
                <div class="col-lg-8">
                    <h1 class="hero-title animate-fade-in">2025年度</h1>
                    <h2 class="hero-subtitle animate-fade-in-delay">ニューメディア研究ゼミ</h2>
                    <p class="hero-description animate-fade-in-delay-2">卒業研究発表</p>
                    <a href="#main-content" class="hero-scroll-indicator">
                        <i class="fas fa-chevron-down"></i>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <div class="container py-5">
            <div class="row mb-5">
                <div class="col-12 text-center">
                    <h2 class="section-title">卒業研究一覧</h2>
                    <p class="section-subtitle">各学生の研究成果をご覧ください</p>
                </div>
            </div>

            <!-- Loading -->
            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">読み込み中...</span>
                </div>
                <p class="mt-3">データを読み込んでいます...</p>
            </div>

            <!-- Error -->
            <div id="error" class="alert alert-danger alert-dismissible fade" role="alert" style="display: none;">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <strong>エラーが発生しました。</strong> Excelファイルを確認してください。
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Student List -->
            <div id="student-list" class="row g-4"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-section">
        <div class="container py-4">
            <div class="row">
                <div class="col-12 text-center">
                    <p class="mb-0">&copy; 2025 ニューメディア研究ゼミ</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SheetJSライブラリ -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
