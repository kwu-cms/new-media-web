<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生詳細 - 2025年度 ニューメディア研究ゼミ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-mortarboard-fill me-2"></i>ニューメディア研究ゼミ
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>一覧に戻る
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content pt-5">
        <div class="container py-5">
            <!-- Loading -->
            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">読み込み中...</span>
                </div>
                <p class="mt-3">データを読み込んでいます...</p>
            </div>

            <!-- Error -->
            <div id="error" class="alert alert-danger alert-dismissible fade" role="alert" style="display: none;">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <strong>エラーが発生しました。</strong> 学生情報が見つかりません。
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Student Detail -->
            <div id="student-detail" style="display: none;">
                <!-- Student Header Card -->
                <div class="card shadow-lg mb-4 student-header-card">
                    <div class="card-body p-4">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <h1 class="display-4 fw-bold mb-2" id="student-name"></h1>
                                <p class="lead text-muted mb-3" id="student-name-en"></p>
                                <div class="d-flex flex-wrap gap-3">
                                    <span class="badge bg-primary fs-6 px-3 py-2">
                                        <i class="bi bi-person-badge me-1"></i>
                                        学籍番号: <span id="student-id"></span>
                                    </span>
                                    <span class="badge bg-secondary fs-6 px-3 py-2">
                                        <i class="bi bi-mortarboard me-1"></i>
                                        <span id="student-grade"></span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Research Title Card -->
                <div class="card shadow-sm mb-4 research-title-card">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-3">
                            <i class="bi bi-lightbulb-fill text-warning me-2"></i>
                            卒業研究題目
                        </h3>
                        <p class="fs-5 mb-0" id="research-title"></p>
                    </div>
                </div>

                <!-- Image Carousel Section -->
                <div class="card shadow-sm mb-4" id="images-section" style="display: none;">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4">
                            <i class="bi bi-images text-info me-2"></i>
                            画像ギャラリー
                        </h3>
                        <div id="image-carousel-container"></div>
                    </div>
                </div>

                <!-- Report Section -->
                <div class="card shadow-sm mb-4" id="report-section" style="display: none;">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4">
                            <i class="bi bi-file-earmark-text-fill text-success me-2"></i>
                            レポート
                        </h3>
                        <div id="report-links" class="d-grid gap-2"></div>
                    </div>
                </div>

                <!-- Presentation Section -->
                <div class="card shadow-sm mb-4" id="presentation-section" style="display: none;">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4">
                            <i class="bi bi-file-earmark-slides-fill text-danger me-2"></i>
                            プレゼンテーション資料
                        </h3>
                        <div id="presentation-links" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content bg-dark">
                <div class="modal-header border-0">
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex align-items-center justify-content-center p-0">
                    <img id="lightbox-img" src="" alt="" class="img-fluid">
                    <button id="lightbox-prev" class="lightbox-nav-btn lightbox-nav-prev">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <button id="lightbox-next" class="lightbox-nav-btn lightbox-nav-next">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-section">
        <div class="container py-4">
            <div class="row">
                <div class="col-12 text-center">
                    <p class="mb-0">&copy; 2025 ニューメディア研究ゼミ</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SheetJSライブラリ -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
