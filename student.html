<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>学生詳細 - 2025年度 ニューメディア研究ゼミ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-graduation-cap me-2"></i>ニューメディア研究ゼミ
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm">
                <i class="fas fa-arrow-left me-1"></i>一覧に戻る
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content pt-5">
        <div class="container py-5">
            <!-- Loading -->
            <div id="loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">読み込み中...</span>
                </div>
                <p class="mt-3">データを読み込んでいます...</p>
            </div>

            <!-- Error -->
            <div id="error" class="alert alert-danger alert-dismissible fade" role="alert" style="display: none;">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <strong>エラーが発生しました。</strong> 学生情報が見つかりません。
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Student Detail -->
            <div id="student-detail" style="display: none;">
                <!-- Student Header Card -->
                <div class="card shadow-lg mb-4 student-header-card">
                    <div class="card-body p-4">
                        <div class="row align-items-center justify-content-center">
                            <div class="col-auto d-flex align-items-center justify-content-end">
                                <button id="prev-student-btn" class="btn btn-nav-student" title="前の学生" disabled>
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                            </div>
                            <div class="col-md-8 col-lg-6 text-center">
                                <h2 class="h3 fw-bold mb-2" id="student-name"></h2>
                                <p class="text-muted mb-3" id="student-name-en" style="font-size: 0.9rem;"></p>
                                <div class="d-flex flex-wrap gap-3 justify-content-center">
                                    <span class="badge bg-primary fs-6 px-3 py-2">
                                        <i class="fas fa-id-card me-1"></i>
                                        <span id="student-id"></span>
                                    </span>
                                    <span class="badge bg-secondary fs-6 px-3 py-2">
                                        <i class="fas fa-graduation-cap me-1"></i>
                                        <span id="student-grade"></span>
                                    </span>
                                </div>
                            </div>
                            <div class="col-auto d-flex align-items-center justify-content-start">
                                <button id="next-student-btn" class="btn btn-nav-student" title="次の学生" disabled>
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Research Title Card -->
                <div class="card shadow-sm mb-4 research-title-card">
                    <div class="card-body p-4">
                        <h1 class="display-5 fw-bold mb-3" id="research-title"></h1>
                    </div>
                </div>

                <!-- Presentation Section (PDF表示) -->
                <div class="card shadow-sm mb-4" id="presentation-section" style="display: none;">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4">
                            <i class="fas fa-file-pdf text-danger me-2"></i>
                            プレゼンテーション資料
                        </h3>
                        <div id="presentation-container"></div>
                    </div>
                </div>

                <!-- Report Section (PDF表示) -->
                <div class="card shadow-sm mb-4" id="report-section" style="display: none;">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4">
                            <i class="fas fa-file-alt text-success me-2"></i>
                            レポート
                        </h3>
                        <div id="report-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <!-- Footer -->
    <footer class="footer-section">
        <div class="container py-4">
            <div class="row">
                <div class="col-12 text-center">
                    <p class="mb-0">&copy; 2025 ニューメディア研究ゼミ</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- SheetJSライブラリ -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
